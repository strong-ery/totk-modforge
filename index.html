<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TotK Modding Resource</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <video autoplay muted loop id="background-video" playsinline>
        <source src="assets/HomeImages/output.mp4" type="video/mp4">
    </video>

    <div id="noise-overlay"></div>

    <header>
        <div class="logo-title-group">
            <img src="assets/HomeImages/Modforge_Square.png" alt="ModForge Logo" id="site-logo">
            <div class="header-text">
                <h1>TotK Modding Resource</h1>
                <p class="tagline">Community guides, tools &amp; information</p>
            </div>
        </div>
        
        <!-- <a class="submit-guide-btn" href="https://forms.gle/yourformid" target="_blank">
            Submit a Guide
        </a> -->
    </header>

    <nav>
        <ul>
            <li data-tab="news" class="active">News</li>
            <li data-tab="guides">Guides</li>
            <li data-tab="information">Information</li>
        </ul>
        <div class="nav-underline"></div>
    </nav>

    <main>
        <section id="news"        class="tab-content active"></section>
        <section id="guides"      class="tab-content"></section>
        <section id="information" class="tab-content"></section>
    </main>

    <script src="script.js"></script>
</body>
</html>
